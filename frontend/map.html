<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FloodGuard — Safe Routes</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>#map{height:80vh;border:1px solid #ccc}</style>
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="synopsis.html">Synopsis</a>
      <a href="diagrams.html">Diagrams</a>
      <a href="map.html">Safe Routes</a>
      <a href="rescue.html">Rescue Dashboard</a>
    </nav>
  </header>

  <main class="container">
    <h1>Safe / Unaffected Roadways</h1>
    <p>Click <strong>Find Safe Routes Near Me</strong> to center the map on your location and highlight example safe roads (demo).</p>
    <button id="locate">Find Safe Routes Near Me</button>
    <div id="map"></div>
  </main>
  <script src="assets/js/config.js"></script>
  <script>
    function loadGoogleMaps(cb){
      if(typeof FG_CONFIG === 'undefined' || !FG_CONFIG.GOOGLE_MAPS_API_KEY || FG_CONFIG.GOOGLE_MAPS_API_KEY === 'YOUR_GOOGLE_MAPS_API_KEY'){
        alert('Please set FG_CONFIG.GOOGLE_MAPS_API_KEY in assets/js/config.js');
        return;
      }
      const key = FG_CONFIG.GOOGLE_MAPS_API_KEY;
      const script = document.createElement('script');
      script.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=places';
      script.async = true; script.defer = true; script.onload = cb;
      document.head.appendChild(script);
    }

    function init(){
      loadGoogleMaps(()=>{
        const map = new google.maps.Map(document.getElementById('map'), { center: {lat:20.0, lng:78.0}, zoom:5 });
        const routes = [];
        const markers = [];

        function clear(){ routes.forEach(r=> r.setMap(null)); routes.length=0; markers.forEach(m=> m.setMap(null)); markers.length=0; }

        document.getElementById('locate').addEventListener('click', ()=>{
          if(!navigator.geolocation){ alert('Geolocation not supported'); return; }
          navigator.geolocation.getCurrentPosition(pos=>{
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            clear();
            markers.push(new google.maps.Marker({position:{lat,lng}, map, title:'You are here'}));

            const dests = [{lat:lat+0.05, lng:lng+0.05}, {lat:lat-0.05, lng:lng-0.05}];
            dests.forEach((d,i)=>{
              markers.push(new google.maps.Marker({position:d, map, label: (i+1).toString(), title:'Safe point '+(i+1)}));
              const line = new google.maps.Polyline({path:[{lat,lng}, d], strokeColor:'#0a0', strokeWeight:4, map});
              routes.push(line);
            });

            const bounds = new google.maps.LatLngBounds();
            routes.forEach(r=> r.getPath().forEach(p=> bounds.extend(p)));
            markers.forEach(m=> bounds.extend(m.getPosition()));
            map.fitBounds(bounds);
          }, err=>{ alert('Unable to get location: ' + err.message); });
        });
      });
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
