<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FloodGuard — Safe Routes</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-animation" id="bgAnim">
    <div class="rain" id="rain"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>

  <header class="site-header">
    <nav class="nav">
      <a href="/index.html" data-i18n="nav_dashboard">Dashboard</a>
      <a href="/map.html" class="active" data-i18n="nav_safe_routes">Safe Routes</a>
      <a href="/rescue.html" data-i18n="nav_rescue">Rescue</a>
    </nav>
    <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('hi')">HI</button>
        <button class="lang-btn" onclick="setLang('mr')">MR</button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
        <h1 data-i18n="hero_map_title">Escape Navigation</h1>
        <p class="tagline" data-i18n="hero_map_tagline">OPTIMIZED EVACUATION PATHS BASED ON AI RISK LEVELS</p>
    </section>

    <div class="card">
        <div class="map-controls">
            <button id="locate" data-i18n="btn_locate">FIND SAFE ROUTES NEAR ME</button>
        </div>
        <div id="map"></div>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    let map;
    let userMarker = null;
    let watchId = null;
    const routes = [];
    const destMarkers = [];

    function loadGoogleMaps(cb){
      if(typeof FG_CONFIG === 'undefined' || !FG_CONFIG.GOOGLE_MAPS_API_KEY || FG_CONFIG.GOOGLE_MAPS_API_KEY === 'YOUR_GOOGLE_MAPS_API_KEY'){
        alert('Please set FG_CONFIG.GOOGLE_MAPS_API_KEY in assets/js/config.js');
        return;
      }
      const key = FG_CONFIG.GOOGLE_MAPS_API_KEY;
      const script = document.createElement('script');
      script.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=places';
      script.async = true; script.defer = true; script.onload = cb;
      document.head.appendChild(script);
    }

    function init(){
      loadGoogleMaps(()=>{
        map = new google.maps.Map(document.getElementById('map'), { 
            center: {lat:20.0, lng:78.0}, 
            zoom:5,
            styles: [
                { "elementType": "geometry", "stylers": [{ "color": "#242f3e" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#746855" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#242f3e" }] },
                { "featureType": "administrative.locality", "elementType": "labels.text.fill", "stylers": [{ "color": "#d59563" }] },
                { "featureType": "poi", "elementType": "labels.text.fill", "stylers": [{ "color": "#d59563" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#38414e" }] },
                { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#212a37" }] },
                { "featureType": "road", "elementType": "labels.text.fill", "stylers": [{ "color": "#9ca5b3" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#17263c" }] }
            ]
        });

        // Auto-start location tracking
        startTracking();

        // Button also triggers safe route calculation
        document.getElementById('locate').addEventListener('click', ()=>{
          if(!navigator.geolocation){ alert('Geolocation not supported'); return; }
          navigator.geolocation.getCurrentPosition(pos=>{
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            showSafeRoutes(lat, lng);
          }, err=>{ alert('Unable to get location: ' + err.message); });
        });
      });

      // Generate rain drops
      const rainContainer = document.getElementById('rain');
      for (let i = 0; i < 50; i++) {
          const drop = document.createElement('div');
          drop.className = 'drop';
          drop.style.left = Math.random() * 100 + 'vw';
          drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
          drop.style.animationDelay = Math.random() * 2 + 's';
          rainContainer.appendChild(drop);
      }
    }

    function startTracking() {
        if(!navigator.geolocation) return;
        
        // Continuously watch position
        watchId = navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            updateUserPosition(lat, lng);
        }, err => {
            console.log('Location tracking error:', err.message);
        }, {
            enableHighAccuracy: true,
            maximumAge: 5000,
            timeout: 10000
        });
    }

    function updateUserPosition(lat, lng) {
        const pos = {lat, lng};
        
        if(userMarker) {
            userMarker.setPosition(pos);
        } else {
            // Create user marker with pulsing blue dot
            userMarker = new google.maps.Marker({
                position: pos,
                map: map,
                title: 'You are here',
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 10,
                    fillColor: '#00d2ff',
                    fillOpacity: 1,
                    strokeColor: '#ffffff',
                    strokeWeight: 3
                },
                zIndex: 999
            });
            // Center map on first location fix
            map.setCenter(pos);
            map.setZoom(14);
        }
    }

    function showSafeRoutes(lat, lng) {
        // Clear previous routes and destination markers
        routes.forEach(r => r.setMap(null)); routes.length = 0;
        destMarkers.forEach(m => m.setMap(null)); destMarkers.length = 0;
        
        // Update user position
        updateUserPosition(lat, lng);

        const dests = FG_CONFIG.SAFE_DESTINATIONS || [{name:'Safe Point A', lat:lat+0.02, lng:lng+0.02}, {name:'Safe Point B', lat:lat-0.02, lng:lng-0.02}];
        dests.forEach((d,i)=>{
          const marker = new google.maps.Marker({position:d, map, label: (i+1).toString(), title: d.name || 'Safe point '+(i+1)});
          destMarkers.push(marker);
          const line = new google.maps.Polyline({path:[{lat,lng}, d], strokeColor:'#4ade80', strokeWeight:5, map, opacity: 0.8});
          routes.push(line);
        });

        const bounds = new google.maps.LatLngBounds();
        bounds.extend({lat, lng});
        routes.forEach(r=> r.getPath().forEach(p=> bounds.extend(p)));
        destMarkers.forEach(m=> bounds.extend(m.getPosition()));
        map.fitBounds(bounds);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
