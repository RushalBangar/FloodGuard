<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FloodGuard — Rescue Control</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .rescue-layout { display: flex; gap: 1.5rem; margin-top: 1.5rem; height: 80vh; }
    .rescue-sidebar { width: 350px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 1.5rem; overflow-y: auto; }
    .rescue-main { flex: 1; position: relative; }
    #map { height: 100%; margin-top: 0; }
    .sos-card { background: rgba(255, 75, 43, 0.1); border-left: 4px solid var(--danger); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; cursor: pointer; transition: 0.3s; }
    .sos-card:hover { background: rgba(255, 75, 43, 0.2); }
    .sos-card h4 { margin-bottom: 0.3rem; }
    .sos-card p { font-size: 0.8rem; color: var(--text-dim); }
    .status-pill { font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 100px; background: var(--danger); color: white; float: right; }
    @media (max-width: 900px) { .rescue-layout { flex-direction: column; height: auto; } .rescue-sidebar { width: 100%; height: 400px; order: 2; } .rescue-main { height: 500px; order: 1; } }
  </style>
</head>
<body>
  <div class="bg-animation" id="bgAnim">
    <div class="lightning-flash"></div>
    <div class="rain" id="rain"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>

  <header class="site-header">
    <nav class="nav">
      <a href="/index.html" data-i18n="nav_dashboard">Dashboard</a>
      <a href="/map.html" data-i18n="nav_safe_routes">Safe Routes</a>
      <a href="/rescue.html" class="active" data-i18n="nav_rescue">Rescue</a>
    </nav>
    <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('hi')">HI</button>
        <button class="lang-btn" onclick="setLang('mr')">MR</button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
        <h1 data-i18n="hero_rescue_title">Rescue Operations Center</h1>
        <p class="tagline" data-i18n="hero_rescue_tagline">REAL-TIME SOS TRACKING & HEATMAP VISUALIZATION</p>
    </section>

    <div class="rescue-layout">
        <div class="rescue-sidebar">
            <h3 style="margin-bottom:1.5rem;" data-i18n="sidebar_sos_title">Active SOS Signals</h3>
            <div id="sosList">
                <p style="color:var(--text-dim); font-size:0.9rem; text-align:center;">Waiting for signals...</p>
            </div>
        </div>
        <div class="rescue-main">
            <div id="map"></div>
        </div>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/firebase.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    let map, heatmap;
    const markers = {};
    const heatPoints = [];
    const knownSOS = new Set(); // Track already-displayed SOS IDs
    let ws = null;
    let wsRetryDelay = 3000;
    const WS_MAX_RETRY = 30000;

    function loadGoogleMaps(cb){
      if(typeof FG_CONFIG === 'undefined' || !FG_CONFIG.GOOGLE_MAPS_API_KEY || FG_CONFIG.GOOGLE_MAPS_API_KEY === 'YOUR_GOOGLE_MAPS_API_KEY'){
        alert('Please set FG_CONFIG.GOOGLE_MAPS_API_KEY in assets/js/config.js');
        return;
      }
      const key = FG_CONFIG.GOOGLE_MAPS_API_KEY;
      const script = document.createElement('script');
      script.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=visualization';
      script.async = true; script.defer = true; script.onload = cb;
      document.head.appendChild(script);
    }

    function init(){
      loadGoogleMaps(()=>{
        map = new google.maps.Map(document.getElementById('map'), { 
            center: {lat:20.0, lng:78.0}, 
            zoom:5,
            disableDefaultUI: true,
            zoomControl: true,
            gestureHandling: 'greedy',
            styles: [
                { "elementType": "geometry", "stylers": [{ "color": "#242f3e" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#746855" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#242f3e" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#17263c" }] }
            ]
        });
        
        heatmap = new google.maps.visualization.HeatmapLayer({
            data: [],
            map: map,
            radius: 30
        });

        // Connect WebSocket
        connectWS();
        
        // Listen for SOS signals in Firestore
        if (window.FG_DB) {
            console.log("Listening for Firestore SOS signals...");
            const helpCol = (typeof FG_CONFIG !== 'undefined' && FG_CONFIG.HELP_COLLECTION) ? FG_CONFIG.HELP_COLLECTION : 'sos_signals';
            FG_DB.collection(helpCol)
                .orderBy('createdAt', 'desc')
                .limit(20)
                .onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const data = change.doc.data();
                            const id = change.doc.id;
                            if (!knownSOS.has(id)) {
                                handleLocation({ ...data, id: id });
                            }
                        }
                    });
                }, err => {
                    console.error("Firestore listen error:", err);
                });

            // Also listen for regular user locations
            const locCol = (typeof FG_CONFIG !== 'undefined' && FG_CONFIG.LOCATION_COLLECTION) ? FG_CONFIG.LOCATION_COLLECTION : 'user_locations';
            FG_DB.collection(locCol)
                .onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added' || change.type === 'modified') {
                            const data = change.doc.data();
                            const id = change.doc.id;
                            handleLocation({ ...data, id: id, isSOS: false });
                        }
                    });
                });
        }
        
        // Also poll REST API for SOS signals (fallback for when WS and Firestore are down)
        fetchSOSSignals();
        setInterval(fetchSOSSignals, 15000);
      });

      // Generate rain drops
      const rainContainer = document.getElementById('rain');
      for (let i = 0; i < 50; i++) {
          const drop = document.createElement('div');
          drop.className = 'drop';
          drop.style.left = Math.random() * 100 + 'vw';
          drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
          drop.style.animationDelay = Math.random() * 2 + 's';
          rainContainer.appendChild(drop);
      }
    }

    function connectWS() {
        const WS_URL = (typeof FG_CONFIG !== 'undefined' && FG_CONFIG.WS_URL) ? FG_CONFIG.WS_URL : ((location.protocol === 'https:') ? 'wss://' : 'ws://') + location.hostname + ':5000/ws';
        try { ws = new WebSocket(WS_URL); } catch(e) { wsRetryDelay = Math.min(wsRetryDelay * 2, WS_MAX_RETRY); setTimeout(connectWS, wsRetryDelay); return; }
        
        ws.addEventListener('open', () => {
            wsRetryDelay = 3000;
            console.log('Rescue WS connected');
        });
        
        ws.addEventListener('message', ev => {
            try {
                const data = JSON.parse(ev.data);
                if(data.type === 'location') {
                    handleLocation(data);
                }
            } catch(e) {}
        });
        
        ws.addEventListener('close', () => {
            wsRetryDelay = Math.min(wsRetryDelay * 2, WS_MAX_RETRY);
            setTimeout(connectWS, wsRetryDelay);
        });
    }

    function fetchSOSSignals() {
        const backendUrl = (typeof FG_CONFIG !== 'undefined' && FG_CONFIG.BACKEND_URL) ? FG_CONFIG.BACKEND_URL : '';
        fetch(backendUrl + '/api/sos')
            .then(r => r.json())
            .then(signals => {
                if(Array.isArray(signals)) {
                    signals.forEach(data => {
                        if(!knownSOS.has(data.id)) {
                            handleLocation(data);
                        }
                    });
                }
            })
            .catch(() => {});
    }

    function handleLocation(data) {
        if(!map) return;
        const id = data.id || 'unknown';
        const lat = data.lat, lng = data.lng;
        const isSOS = data.isSOS || false;
        const pos = {lat, lng};

        if(markers[id]) markers[id].setPosition(pos);
        else {
            markers[id] = new google.maps.Marker({
                position: pos, 
                map, 
                title: data.name || 'User',
                animation: isSOS ? google.maps.Animation.BOUNCE : null,
                icon: isSOS ? 'https://maps.google.com/mapfiles/ms/icons/red-dot.png' : 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png'
            });
        }

        if(isSOS && !knownSOS.has(id)) {
            knownSOS.add(id);
            addSOSCard(data);
            heatPoints.push(new google.maps.LatLng(lat, lng));
            heatmap.setData(heatPoints);
            // Play alert sound
            const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-emergency-alert-alarm-1007.mp3');
            audio.play().catch(e=>{});
            // Pan map to SOS location
            map.setCenter(pos);
            map.setZoom(12);
        }
    }

    function addSOSCard(data) {
        const list = document.getElementById('sosList');
        if(list.querySelector('p')) list.innerHTML = '';
        const card = document.createElement('div');
        card.className = 'sos-card';
        const time = new Date().toLocaleTimeString();
        card.innerHTML = `
            <span class="status-pill">URGENT</span>
            <h4>${data.name || 'Anonymous User'}</h4>
            <p>ID: ${data.id || 'Unknown'} · ${time}</p>
            <p>Coord: ${data.lat.toFixed(4)}, ${data.lng.toFixed(4)}</p>
            <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                <button style="font-size:0.6rem; padding:0.3rem 0.5rem;" onclick="focusUser(${data.lat}, ${data.lng})">LOCATE</button>
                <button class="secondary" style="font-size:0.6rem; padding:0.3rem 0.5rem;" onclick="this.parentElement.parentElement.remove()">CLEAR</button>
            </div>
        `;
        list.prepend(card);
    }

    function focusUser(lat, lng) {
        map.setCenter({lat, lng});
        map.setZoom(15);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
