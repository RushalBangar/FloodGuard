<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <style>.box{fill:#f7f9fb;stroke:#333;stroke-width:2}.label{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#111}</style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#333"/></marker></defs>
  <rect x="30" y="240" width="140" height="100" class="box"/>
  <text x="100" y="300" text-anchor="middle" class="label">Sensors</text>

  <rect x="210" y="120" width="200" height="140" class="box"/>
  <text x="310" y="190" text-anchor="middle" class="label">Data Aggregator</text>

  <rect x="450" y="120" width="220" height="140" class="box"/>
  <text x="560" y="190" text-anchor="middle" class="label">ML Prediction Engine</text>

  <rect x="740" y="120" width="200" height="140" class="box"/>
  <text x="840" y="190" text-anchor="middle" class="label">Alert Server</text>

  <rect x="450" y="320" width="220" height="140" class="box"/>
  <text x="560" y="390" text-anchor="middle" class="label">Rescue Dashboard</text>

  <rect x="740" y="320" width="200" height="140" class="box"/>
  <text x="840" y="390" text-anchor="middle" class="label">Mobile App</text>

  <line x1="170" y1="290" x2="210" y2="190" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="410" y1="190" x2="450" y2="190" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="670" y1="190" x2="740" y2="190" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="650" y1="260" x2="650" y2="320" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="740" y1="260" x2="740" y2="320" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
